<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecureVault enterprise cloud security file explorer dashboard">
  <title>SecureVault Dashboard</title>
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("securevault-theme-mode");
        document.documentElement.dataset.theme = storedTheme === "light" ? "light" : "dark";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
